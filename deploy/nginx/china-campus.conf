upstream china_campus_web {
  server 127.0.0.1:3000;
  keepalive 32;
}

upstream china_campus_cms {
  server 127.0.0.1:1337;
  keepalive 16;
}

server {
  listen 80;
  server_name example.cn www.example.cn;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name example.cn www.example.cn;

  ssl_certificate /etc/nginx/ssl/example.cn/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/example.cn/privkey.pem;

  client_max_body_size 20m;

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://china_campus_web;
  }
}

server {
  listen 80;
  server_name cms.example.cn;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name cms.example.cn;

  ssl_certificate /etc/nginx/ssl/cms.example.cn/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/cms.example.cn/privkey.pem;

  client_max_body_size 50m;

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://china_campus_cms;
  }
}
